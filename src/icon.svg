<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Circle with glassmorphism style border -->
  <circle cx="64" cy="64" r="60" fill="url(#bgGrad)" stroke="url(#glowGrad)" stroke-width="3" />

  <!-- Stylized Ibis (Thoth) & AI nodes -->
  <g filter="url(#glow)">
    <!-- Crown or AI node arcs -->
    <path d="M 40 35 C 50 25, 78 25, 88 35" fill="none" stroke="#06b6d4" stroke-width="2" stroke-dasharray="3 3" />
    
    <!-- Stylized Ibis head and beak curving down -->
    <path d="M 75 45 C 80 55, 75 70, 70 75 C 65 80, 50 82, 35 78 C 45 74, 55 70, 60 62 C 63 58, 62 50, 55 45 C 48 40, 55 35, 65 38 Z" fill="url(#glowGrad)" />
    
    <!-- An eye representing Thoth's wisdom -->
    <circle cx="66" cy="48" r="3" fill="#ffffff" />
    <path d="M 60 48 Q 66 42 72 48 Q 66 54 60 48 Z" fill="none" stroke="#0891b2" stroke-width="1" />
    
    <!-- Cybernetic connections / AI Nodes -->
    <line x1="66" y1="48" x2="88" y2="40" stroke="#8b5cf6" stroke-width="1.5" />
    <line x1="75" y1="65" x2="95" y2="65" stroke="#06b6d4" stroke-width="1.5" />
    <line x1="70" y1="75" x2="85" y2="90" stroke="#8b5cf6" stroke-width="1.5" />
    <line x1="55" y1="45" x2="35" y2="50" stroke="#06b6d4" stroke-width="1.5" />

    <!-- Connection dots -->
    <circle cx="88" cy="40" r="3" fill="#8b5cf6" />
    <circle cx="95" cy="65" r="3" fill="#06b6d4" />
    <circle cx="85" cy="90" r="3" fill="#8b5cf6" />
    <circle cx="35" cy="50" r="3" fill="#06b6d4" />
  </g>
  
  <!-- Subtle brand text -->
  <text x="64" y="112" font-family="'Segoe UI', Roboto, sans-serif" font-weight="bold" font-size="14" fill="#ffffff" text-anchor="middle" letter-spacing="1">THOTH</text>
</svg>
